# 공통 설정
global:
  period:
    startDate: "20250201"
    endDate: "20260220"
  reviewThreshold: 3      # 호출건수 기준으로 차단대상 판단 시 1~최대 허용할수 있는 건수, 예) 1~3건은 차단대상으로 본다.
  password: "lotte1!"
  gitBinPath: git

  # 와탭 공통 프로필 (URL/쿠키 공유, 레포에서 profileName으로 참조)
  whatapProfiles:
    - name: "운영"
      url: ""
      cookie: ""
    - name: "개발"
      url: ""
      cookie: ""

  # 제니퍼 공통 프로필 (URL/Bearer토큰 공유, 레포에서 profileName으로 참조)
  jenniferProfiles:
    - name: "운영"
      url: ""
      bearerToken: ""
    - name: "개발"
      url: ""
      bearerToken: ""

