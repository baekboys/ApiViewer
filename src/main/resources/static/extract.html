<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Viewer — API 추출</title>
  <style>
    :root {
      --bg: #f4f6f9; --card: #ffffff; --primary: #3b82f6; --primary-hover: #2563eb;
      --danger: #ef4444; --success: #22c55e; --purple: #8b5cf6;
      --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
      --shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

    .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); }
    .header h1 { font-size: 18px; font-weight: 700; color: var(--primary); }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .tag { font-size: 11px; background: #ede9fe; color: #5b21b6; padding: 3px 8px; border-radius: 4px; font-weight: 600; }

    .main { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .card-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .card-title .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-blue { background: var(--primary); }
    .dot-purple { background: var(--purple); }

    .config-grid { display: grid; grid-template-columns: 2fr 1fr 1.2fr 0.8fr 0.8fr; gap: 10px; }
    .config-grid-w { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1.5fr; gap: 10px; }
    .config-row2 { display: grid; grid-template-columns: 2fr auto; gap: 10px; margin-top: 10px; align-items: end; }
    .config-row3 { display: grid; grid-template-columns: 1.5fr 1.5fr auto; gap: 10px; margin-top: 10px; align-items: end; }
    label.field { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--text-muted); font-weight: 600; }
    label.field input, label.field select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; outline: none; transition: border .15s; background: var(--card); }
    label.field input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px #3b82f620; }
    label.field input.purple:focus { border-color: var(--purple); box-shadow: 0 0 0 2px #8b5cf620; }

    .whatap-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .whatap-header:hover .card-title { color: var(--purple); }
    .toggle-arrow { font-size: 12px; color: var(--text-muted); transition: transform .2s; }
    .toggle-arrow.open { transform: rotate(180deg); }
    .whatap-body { overflow: hidden; max-height: 0; transition: max-height .3s ease; }
    .whatap-body.open { max-height: 300px; }

    .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s, opacity .15s; white-space: nowrap; height: 34px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-blue { background: var(--primary); color: #fff; }
    .btn-blue:not(:disabled):hover { background: var(--primary-hover); }
    .btn-purple { background: var(--purple); color: #fff; }
    .btn-purple:not(:disabled):hover { background: #7c3aed; }
    .nav-link { font-size:12px; color:var(--text-muted); font-weight:600; text-decoration:none; padding:6px 12px; border:1px solid var(--border); border-radius:6px; }
    .nav-link:hover { background:#f1f5f9; }
    .nav-active { color:var(--primary) !important; border-color:var(--primary) !important; }

    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; display: none; }
    .progress-fill { height: 100%; background: var(--purple); border-radius: 2px; animation: prog 2s ease-in-out infinite; }
    @keyframes prog { 0%{width:0;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0;margin-left:100%} }

    .toast { position: fixed; bottom: 24px; right: 24px; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; color: #fff; z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--danger); }
    .toast.success { background: var(--success); }
    .toast.info { background: var(--purple); }

    .progress-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .progress-overlay.show { opacity: 1; pointer-events: auto; }
    .progress-modal { background: var(--card); border-radius: 14px; padding: 32px 36px; width: 480px; max-width: 90vw; box-shadow: 0 8px 40px rgba(0,0,0,.18); }
    .progress-modal-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .progress-modal-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
    .progress-repo { font-size: 12px; font-weight: 600; color: var(--primary); background: #eff6ff; border-radius: 6px; padding: 6px 10px; margin-bottom: 10px; display: none; }
    .progress-track { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; margin-bottom: 10px; }
    .progress-track-fill { height: 100%; background: var(--primary); border-radius: 5px; transition: width .4s ease; width: 0%; }
    .progress-stats { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
    .progress-percent { font-size: 28px; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 8px; }
    .progress-file { font-size: 11px; color: var(--text-muted); background: var(--bg); border-radius: 6px; padding: 7px 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'Consolas', monospace; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .all-repo-info { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 12px 16px; font-size: 12px; color: #1e40af; margin-bottom: 0; }
    .all-repo-info strong { display: block; font-size: 13px; margin-bottom: 4px; }
  </style>
</head>
<body>

<!-- 추출 진행 오버레이 -->
<div class="progress-overlay" id="progressOverlay">
  <div class="progress-modal">
    <div class="progress-modal-title">
      <div class="spinner"></div>
      API 추출 중
    </div>
    <div class="progress-modal-sub">Controller 파일을 분석하고 있습니다. 잠시만 기다려 주세요.</div>
    <div class="progress-repo" id="overlayRepoInfo"></div>
    <div class="progress-percent" id="overlayPercent">0%</div>
    <div class="progress-track">
      <div class="progress-track-fill" id="overlayFill"></div>
    </div>
    <div class="progress-stats">
      <span id="overlayCount">파일 탐색 중...</span>
      <span id="overlayCountRight"></span>
    </div>
    <div class="progress-file" id="overlayFile">준비 중...</div>
  </div>
</div>

<div class="header">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
  </svg>
  <h1>API Viewer</h1>
  <div class="header-right">
    <span id="whatapBadge" class="tag" style="display:none">Whatap 연동됨</span>
    <a href="/"             class="nav-link">📊 대시보드</a>
    <a href="/extract.html" class="nav-link nav-active">🔍 API 추출</a>
    <a href="/viewer.html"  class="nav-link">📋 이력 조회</a>
    <a href="/settings.html"class="nav-link">⚙️ 설정</a>
  </div>
</div>

<div class="main">

  <!-- ─── API 추출 설정 ─── -->
  <div class="card">
    <div class="card-title">
      <span class="dot dot-blue"></span>API 추출 설정
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <span style="font-size:11px;color:var(--text-muted);font-weight:400;">레포지토리 선택</span>
        <select id="repoConfigSelect" onchange="onRepoSelect()" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none;background:var(--card);min-width:180px;">
          <option value="">-- 선택 --</option>
          <option value="all">🔄 전체 레포 추출</option>
        </select>
      </div>
    </div>

    <!-- 전체 추출 안내 -->
    <div id="allRepoInfo" style="display:none;" class="all-repo-info">
      <strong>전체 레포지토리 순차 추출</strong>
      설정된 모든 레포지토리를 순서대로 추출합니다. 완료 후 이력 조회 화면으로 이동합니다.
    </div>

    <!-- 개별 레포 입력 폼 -->
    <div id="singleRepoForm">
      <div class="config-grid">
        <label class="field">소스 경로 (ROOT_PATH) *
          <input id="rootPath" type="text" placeholder="/Users/.../my-project/src/main/java" oninput="autoFillRepoName()">
        </label>
        <label class="field">레포지토리명 (DB 저장 키)
          <input id="repositoryName" type="text" placeholder="my-project">
        </label>
        <label class="field">도메인 (DOMAIN)
          <input id="domain" type="text" placeholder="https://api.example.com">
        </label>
        <label class="field">API 경로 프리픽스
          <input id="apiPathPrefix" type="text" placeholder="/APP">
        </label>
        <label class="field">Git 실행 경로
          <input id="gitBinPath" type="text" placeholder="git">
        </label>
      </div>
      <div class="config-row2">
        <label class="field">상수 치환 (PATH_CONSTANTS)
          <input id="pathConstants" type="text" placeholder="Constants.BASE=/v1, ApiConst.ROOT=/api/v2">
        </label>
        <button class="btn btn-blue" id="extractBtn" onclick="doExtract()">추출 시작</button>
      </div>
    </div>

    <!-- 전체 추출 버튼 -->
    <div id="allRepoBtn" style="display:none;margin-top:12px;text-align:right;">
      <button class="btn btn-blue" id="extractAllBtn" onclick="doExtract()">전체 추출 시작</button>
    </div>
  </div>

  <!-- ─── Whatap 설정 ─── -->
  <div class="card" style="padding-bottom:14px;">
    <div class="whatap-header" onclick="toggleWhatap()">
      <div class="card-title" style="margin-bottom:0;">
        <span class="dot dot-purple"></span>Whatap APM 호출건수 조회
        <span style="font-size:10px;font-weight:400;color:var(--text-muted);">활성화하면 추출된 API의 실제 호출건수를 가져옵니다</span>
      </div>
      <span class="toggle-arrow" id="whatapArrow">▼</span>
    </div>
    <div class="progress-bar" id="whatapProgress"><div class="progress-fill"></div></div>
    <div class="whatap-body" id="whatapBody">
      <div style="margin-top:14px;">
        <div class="config-grid-w">
          <label class="field">Whatap URL *
            <input class="purple" id="wUrl" type="text" placeholder="https://whatap.io/api/...">
          </label>
          <label class="field">Project Code (pcode)
            <input class="purple" id="wPcode" type="number" value="8" placeholder="8">
          </label>
          <label class="field">시작일 *
            <input class="purple" id="wStart" type="text" placeholder="20250101">
          </label>
          <label class="field">종료일 *
            <input class="purple" id="wEnd" type="text" placeholder="20251231">
          </label>
          <label class="field">서비스 필터 (쉼표 구분, 빈칸=전체)
            <input class="purple" id="wFilter" type="text" placeholder="/app, /api">
          </label>
        </div>
        <div class="config-row3">
          <label class="field">Agent OKINDS (쉼표 구분, 빈칸=전체)
            <input class="purple" id="wOkinds" type="text" placeholder="123, 456">
          </label>
          <label class="field">쿠키 (Cookie) *
            <input class="purple" id="wCookie" type="password" placeholder="브라우저 개발자도구에서 복사">
          </label>
          <button class="btn btn-purple" id="whatapBtn" onclick="doFetchWhatap()" style="align-self:end;">호출건수 가져오기</button>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let allRepos = [];
  let whatapOpen = false;

  // ── 레포 설정 목록 로드 ───────────────────────────────────
  async function initRepoConfigs() {
    try {
      const res = await fetch('/api/config/repos');
      allRepos = await res.json();
      const sel = document.getElementById('repoConfigSelect');
      allRepos.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.id; opt.textContent = r.repoName;
        sel.appendChild(opt);
      });
    } catch(e) {}
  }

  function onRepoSelect() {
    const val = document.getElementById('repoConfigSelect').value;
    const isAll = val === 'all';
    document.getElementById('allRepoInfo').style.display  = isAll ? 'block' : 'none';
    document.getElementById('singleRepoForm').style.display = isAll ? 'none' : 'block';
    document.getElementById('allRepoBtn').style.display   = isAll ? 'block' : 'none';
    if (!isAll && val) loadRepoConfig(val);
  }

  async function loadRepoConfig(id) {
    if (!id) return;
    try {
      const [repoRes, globalRes] = await Promise.all([
        fetch(`/api/config/repos/${id}`),
        fetch('/api/config/global')
      ]);
      const r = await repoRes.json();
      const g = await globalRes.json();

      document.getElementById('rootPath').value       = r.rootPath       || '';
      document.getElementById('repositoryName').value = r.repoName       || '';
      document.getElementById('domain').value         = r.domain         || '';
      document.getElementById('apiPathPrefix').value  = r.apiPathPrefix  || '';
      document.getElementById('gitBinPath').value     = r.gitBinPath     || '';
      document.getElementById('pathConstants').value  = r.pathConstants  || '';

      if (r.whatapEnabled === 'Y') {
        document.getElementById('wUrl').value    = r.whatapUrl    || '';
        document.getElementById('wPcode').value  = r.whatapPcode  || 8;
        document.getElementById('wFilter').value = r.whatapFilter || '';
        document.getElementById('wOkinds').value = r.whatapOkinds || '';
        document.getElementById('wCookie').value = r.whatapCookie || '';
        if (g.startDate) document.getElementById('wStart').value = g.startDate;
        if (g.endDate)   document.getElementById('wEnd').value   = g.endDate;
        if (!whatapOpen) toggleWhatap();
      }
      showToast(`"${r.repoName}" 설정을 불러왔습니다.`, 'info');
    } catch(e) { showToast('설정 불러오기 실패', 'error'); }
  }

  // ── Whatap 패널 토글 ─────────────────────────────────────
  function toggleWhatap() {
    whatapOpen = !whatapOpen;
    document.getElementById('whatapBody').classList.toggle('open', whatapOpen);
    document.getElementById('whatapArrow').classList.toggle('open', whatapOpen);
  }

  // ── API 추출 ─────────────────────────────────────────────
  let progressTimer = null;

  async function doExtract() {
    const selVal = document.getElementById('repoConfigSelect').value;

    if (selVal === 'all') {
      const repos = allRepos.filter(r => r.rootPath);
      if (repos.length === 0) { showToast('추출할 레포지토리가 없습니다.', 'error'); return; }

      setExtracting(true);
      showProgress(true);

      for (let i = 0; i < repos.length; i++) {
        const r = repos[i];
        updateRepoInfo(`레포 ${i+1}/${repos.length}: ${r.repoName}`);
        try {
          await extractOneRepo(r.rootPath, r.repoName, r.domain || '', r.apiPathPrefix || '', r.gitBinPath || 'git', r.pathConstants || '');
        } catch(e) {
          showToast(`${r.repoName} 오류: ${e.message}`, 'error');
        }
      }

      setExtracting(false);
      showProgress(false);
      window.location.href = '/viewer.html';

    } else {
      const rootPath = document.getElementById('rootPath').value.trim();
      if (!rootPath) { showToast('소스 경로를 입력하세요.', 'error'); return; }

      setExtracting(true);
      showProgress(true);

      const repoName = document.getElementById('repositoryName').value.trim();
      try {
        await extractOneRepo(
          rootPath, repoName,
          document.getElementById('domain').value.trim(),
          document.getElementById('apiPathPrefix').value.trim(),
          document.getElementById('gitBinPath').value.trim(),
          document.getElementById('pathConstants').value.trim()
        );
      } catch(e) {
        showToast('추출 오류: ' + e.message, 'error');
      }

      setExtracting(false);
      showProgress(false);
      window.location.href = repoName
        ? `/viewer.html?repo=${encodeURIComponent(repoName)}`
        : '/viewer.html';
    }
  }

  function extractOneRepo(rootPath, repositoryName, domain, apiPathPrefix, gitBinPath, pathConstants) {
    return new Promise(async (resolve, reject) => {
      try {
        const res = await fetch('/api/extract', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ rootPath, repositoryName, domain, apiPathPrefix, gitBinPath, pathConstants })
        });
        const data = await res.json();
        if (!res.ok) { reject(new Error(data.error || '서버 오류')); return; }

        progressTimer = setInterval(async () => {
          try {
            const p = await (await fetch('/api/progress')).json();
            updateProgressBar(p.percent, p.processed, p.total, p.currentFile);
            if (!p.extracting) {
              clearInterval(progressTimer); progressTimer = null;
              if (p.error) showToast(`오류: ${p.error}`, 'error');
              else if (p.savedCount >= 0) showToast(`${repositoryName || '추출'} 완료 — ${p.savedCount}개 저장`, 'success');
              resolve();
            }
          } catch(e) {
            clearInterval(progressTimer); progressTimer = null;
            reject(e);
          }
        }, 500);
      } catch(e) { reject(e); }
    });
  }

  function updateProgressBar(percent, processed, total, file) {
    document.getElementById('overlayFill').style.width = percent + '%';
    document.getElementById('overlayPercent').textContent = percent + '%';
    document.getElementById('overlayFile').textContent = file || '분석 중...';
    document.getElementById('overlayCount').textContent =
      total > 0 ? `${processed} / ${total} 파일 완료` : '파일 목록 탐색 중...';
    document.getElementById('overlayCountRight').textContent = '';
  }

  function updateRepoInfo(text) {
    const el = document.getElementById('overlayRepoInfo');
    el.textContent = text; el.style.display = 'block';
    updateProgressBar(0, 0, 0, '준비 중...');
  }

  function showProgress(v) {
    document.getElementById('progressOverlay').classList.toggle('show', v);
    if (v) {
      document.getElementById('overlayRepoInfo').style.display = 'none';
      updateProgressBar(0, 0, 0, '준비 중...');
    }
  }

  // ── Whatap 통계 가져오기 ─────────────────────────────────
  async function doFetchWhatap() {
    const url    = document.getElementById('wUrl').value.trim();
    const cookie = document.getElementById('wCookie').value.trim();
    const start  = document.getElementById('wStart').value.trim();
    const end    = document.getElementById('wEnd').value.trim();
    if (!url)    { showToast('Whatap URL을 입력하세요.', 'error'); return; }
    if (!cookie) { showToast('쿠키를 입력하세요.', 'error'); return; }
    if (!start || !end) { showToast('시작일/종료일을 입력하세요.', 'error'); return; }

    const btn = document.getElementById('whatapBtn');
    btn.disabled = true; btn.textContent = '조회 중...';
    document.getElementById('whatapProgress').style.display = 'block';

    try {
      const res = await fetch('/api/whatap/stats', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          whatapUrl: url,
          pcode:     parseInt(document.getElementById('wPcode').value) || 8,
          cookie, startDate: start, endDate: end,
          filters: document.getElementById('wFilter').value.trim(),
          okinds:  document.getElementById('wOkinds').value.trim()
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '서버 오류');

      document.getElementById('whatapBadge').style.display = 'inline';
      showToast(`Whatap 완료 — ${data.apiCount}건 수집`, 'info');

      const repoName = document.getElementById('repositoryName').value.trim();
      if (repoName && data.stats) {
        const callCounts = {};
        Object.entries(data.stats).forEach(([k, v]) => { callCounts[k] = v; });
        fetch('/api/db/call-counts', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ repoName, callCounts })
        }).catch(() => {});
      }
    } catch(e) {
      showToast('Whatap 오류: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = '호출건수 가져오기';
      document.getElementById('whatapProgress').style.display = 'none';
    }
  }

  // ── UI 헬퍼 ──────────────────────────────────────────────
  function setExtracting(v) {
    const b1 = document.getElementById('extractBtn');
    const b2 = document.getElementById('extractAllBtn');
    if (b1) { b1.disabled = v; b1.textContent = v ? '추출 중...' : '추출 시작'; }
    if (b2) { b2.disabled = v; b2.textContent = v ? '추출 중...' : '전체 추출 시작'; }
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function autoFillRepoName() {
    const repoInput = document.getElementById('repositoryName');
    if (repoInput.value.trim()) return;
    const path = document.getElementById('rootPath').value.trim();
    if (!path) return;
    const parts = path.replace(/\\/g, '/').split('/').filter(Boolean);
    const skip = new Set(['src', 'main', 'java', 'kotlin']);
    for (let i = parts.length - 1; i >= 0; i--) {
      if (!skip.has(parts[i].toLowerCase())) { repoInput.value = parts[i]; break; }
    }
  }

  initRepoConfigs();

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.closest('.card')) {
      if (document.activeElement.classList.contains('purple')) doFetchWhatap();
      else doExtract();
    }
  });
</script>
</body>
</html>
