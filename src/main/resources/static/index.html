<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Viewer</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --danger: #ef4444;
      --success: #22c55e;
      --warn: #f59e0b;
      --purple: #8b5cf6;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --row-hover: #f8fafc;
      --shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

    /* Header */
    .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); }
    .header h1 { font-size: 18px; font-weight: 700; color: var(--primary); }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .tag { font-size: 11px; background: #ede9fe; color: #5b21b6; padding: 3px 8px; border-radius: 4px; font-weight: 600; }

    /* Main layout */
    .main { max-width: 1700px; margin: 0 auto; padding: 20px 24px; }

    /* Card 공통 */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .card-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .card-title .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-blue   { background: var(--primary); }
    .dot-purple { background: var(--purple); }

    /* 설정 그리드 */
    .config-grid { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; gap: 10px; }
    .config-grid-w { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1.5fr; gap: 10px; }
    .config-row2 { display: grid; grid-template-columns: 2fr auto; gap: 10px; margin-top: 10px; align-items: end; }
    .config-row3 { display: grid; grid-template-columns: 1.5fr 1.5fr auto; gap: 10px; margin-top: 10px; align-items: end; }
    label.field { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--text-muted); font-weight: 600; }
    label.field input, label.field select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; outline: none; transition: border .15s; background: var(--card); }
    label.field input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px #3b82f620; }
    label.field input.purple:focus { border-color: var(--purple); box-shadow: 0 0 0 2px #8b5cf620; }

    /* Whatap 토글 */
    .whatap-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .whatap-header:hover .card-title { color: var(--purple); }
    .toggle-arrow { font-size: 12px; color: var(--text-muted); transition: transform .2s; }
    .toggle-arrow.open { transform: rotate(180deg); }
    .whatap-body { overflow: hidden; max-height: 0; transition: max-height .3s ease; }
    .whatap-body.open { max-height: 300px; }

    /* 버튼 */
    .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s, opacity .15s; white-space: nowrap; height: 34px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-blue   { background: var(--primary); color: #fff; }
    .btn-blue:not(:disabled):hover { background: var(--primary-hover); }
    .btn-purple { background: var(--purple); color: #fff; }
    .btn-purple:not(:disabled):hover { background: #7c3aed; }
    .btn-ghost  { background: #f1f5f9; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:not(:disabled):hover { background: #e2e8f0; }

    /* Stats bar */
    .stats-bar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .stat-pill { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 12px; display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow); }
    .stat-pill strong { font-size: 15px; font-weight: 700; }
    .stat-pill.dep strong { color: var(--danger); }
    .stat-pill.ok  strong { color: var(--success); }
    .stat-pill.apm strong { color: var(--purple); }

    /* 검색바 */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .filter-bar input[type=text] { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; outline: none; width: 260px; }
    .filter-bar input:focus { border-color: var(--primary); }
    .filter-bar select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; outline: none; background: var(--card); }
    .filter-count { margin-left: auto; font-size: 12px; color: var(--text-muted); }

    /* Table */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: auto; box-shadow: var(--shadow); max-height: calc(100vh - 340px); }
    table { width: 100%; border-collapse: collapse; }
    thead th { position: sticky; top: 0; z-index: 2; background: #f1f5f9; padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
    thead th:hover { background: #e2e8f0; }
    thead th.sorted { color: var(--primary); }
    thead th.apm-col { color: var(--purple); }
    .sort-icon { margin-left: 3px; opacity: .4; }
    .sorted .sort-icon { opacity: 1; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }
    tbody td { padding: 8px 12px; vertical-align: top; max-width: 300px; word-break: break-all; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .badge-GET     { background: #dcfce7; color: #166534; }
    .badge-POST    { background: #dbeafe; color: #1e40af; }
    .badge-PUT     { background: #fef9c3; color: #854d0e; }
    .badge-DELETE  { background: #fee2e2; color: #991b1b; }
    .badge-PATCH   { background: #ede9fe; color: #5b21b6; }
    .badge-REQUEST { background: #f1f5f9; color: #475569; }
    .badge-dep     { background: #fee2e2; color: #991b1b; font-size: 10px; }
    .badge-ok      { background: #f1f5f9; color: #64748b; font-size: 10px; }

    /* 호출건수 컬럼 */
    .call-count  { font-weight: 700; color: var(--purple); font-size: 13px; text-align: right; font-family: 'Consolas', monospace; }
    .call-none   { color: #cbd5e1; font-size: 11px; }
    .call-zero   { color: var(--danger); font-weight: 700; }
    .apm-header  { background: #f5f3ff !important; }

    /* API path */
    .api-path  { font-family: 'Consolas', monospace; font-size: 12px; color: #1e40af; }
    .api-op    { color: var(--text-muted); font-size: 12px; }
    .ctrl-name { font-size: 11px; color: var(--text-muted); }
    .git-info  { font-size: 11px; color: var(--text-muted); line-height: 1.6; }
    .git-date  { font-weight: 600; color: var(--text); }

    /* 상태박스 */
    .state-box { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .spinner { display: inline-block; width: 26px; height: 26px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 10px; }
    .spinner-purple { border-top-color: var(--purple); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; color: #fff; z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .toast.error   { background: var(--danger); }
    .toast.success { background: var(--success); }
    .toast.info    { background: var(--purple); }

    /* Whatap progress */
    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; display: none; }
    .progress-fill { height: 100%; background: var(--purple); border-radius: 2px; animation: progress 2s ease-in-out infinite; }
    @keyframes progress { 0%{width:0;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0;margin-left:100%} }
  </style>
</head>
<body>

<div class="header">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
  </svg>
  <h1>API Viewer</h1>
  <div class="header-right">
    <span id="whatapBadge" class="tag" style="display:none">Whatap 연동됨</span>
    <span style="font-size:12px;color:var(--text-muted);">Spring Controller API 추출기</span>
  </div>
</div>

<div class="main">

  <!-- ─── API 추출 설정 ─── -->
  <div class="card">
    <div class="card-title"><span class="dot dot-blue"></span>API 추출 설정</div>
    <div class="config-grid">
      <label class="field">소스 경로 (ROOT_PATH) *
        <input id="rootPath" type="text" placeholder="/Users/.../my-project/src/main/java">
      </label>
      <label class="field">도메인 (DOMAIN)
        <input id="domain" type="text" placeholder="https://api.example.com">
      </label>
      <label class="field">API 경로 프리픽스
        <input id="apiPathPrefix" type="text" placeholder="/APP">
      </label>
      <label class="field">Git 실행 경로
        <input id="gitBinPath" type="text" placeholder="git">
      </label>
    </div>
    <div class="config-row2">
      <label class="field">상수 치환 (PATH_CONSTANTS)
        <input id="pathConstants" type="text" placeholder="Constants.BASE=/v1, ApiConst.ROOT=/api/v2">
      </label>
      <button class="btn btn-blue" id="extractBtn" onclick="doExtract()">추출 시작</button>
    </div>
  </div>

  <!-- ─── Whatap 설정 (접힘/펼침) ─── -->
  <div class="card" style="padding-bottom:14px;">
    <div class="whatap-header" onclick="toggleWhatap()">
      <div class="card-title" style="margin-bottom:0;">
        <span class="dot dot-purple"></span>Whatap APM 호출건수 조회
        <span style="font-size:10px;font-weight:400;color:var(--text-muted);">활성화하면 추출된 API의 실제 호출건수를 가져옵니다</span>
      </div>
      <span class="toggle-arrow" id="whatapArrow">▼</span>
    </div>
    <div class="progress-bar" id="whatapProgress"><div class="progress-fill"></div></div>
    <div class="whatap-body" id="whatapBody">
      <div style="margin-top:14px;">
        <div class="config-grid-w">
          <label class="field">Whatap URL *
            <input class="purple" id="wUrl" type="text" placeholder="https://whatap.io/api/...">
          </label>
          <label class="field">Project Code (pcode)
            <input class="purple" id="wPcode" type="number" value="8" placeholder="8">
          </label>
          <label class="field">시작일 *
            <input class="purple" id="wStart" type="text" placeholder="20250101">
          </label>
          <label class="field">종료일 *
            <input class="purple" id="wEnd" type="text" placeholder="20251231">
          </label>
          <label class="field">서비스 필터 (쉼표 구분, 빈칸=전체)
            <input class="purple" id="wFilter" type="text" placeholder="/app, /api">
          </label>
        </div>
        <div class="config-row3">
          <label class="field">Agent OKINDS (쉼표 구분, 빈칸=전체)
            <input class="purple" id="wOkinds" type="text" placeholder="123, 456">
          </label>
          <label class="field">쿠키 (Cookie) *
            <input class="purple" id="wCookie" type="password" placeholder="브라우저 개발자도구에서 복사">
          </label>
          <button class="btn btn-purple" id="whatapBtn" onclick="doFetchWhatap()" style="align-self:end;">호출건수 가져오기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── 통계 바 ─── -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-pill ok"><span>전체</span><strong id="statTotal">0</strong></div>
    <div class="stat-pill"><span>Active</span><strong id="statActive">0</strong></div>
    <div class="stat-pill dep"><span>Deprecated</span><strong id="statDep">0</strong></div>
    <div class="stat-pill"><span>GET</span><strong id="statGet">0</strong></div>
    <div class="stat-pill"><span>POST</span><strong id="statPost">0</strong></div>
    <div class="stat-pill"><span>PUT</span><strong id="statPut">0</strong></div>
    <div class="stat-pill"><span>DELETE</span><strong id="statDelete">0</strong></div>
    <div class="stat-pill apm" id="statApmPill" style="display:none">
      <span>APM 수집</span><strong id="statApm">0</strong>
    </div>
  </div>

  <!-- ─── 검색 & 필터 ─── -->
  <div class="filter-bar" id="filterBar" style="display:none">
    <input type="text" id="searchInput" placeholder="경로, 컨트롤러, 메소드명 검색..." oninput="filterTable()">
    <select id="methodFilter" onchange="filterTable()">
      <option value="">전체 HTTP Method</option>
      <option>GET</option><option>POST</option><option>PUT</option>
      <option>DELETE</option><option>PATCH</option><option>REQUEST</option>
    </select>
    <select id="depFilter" onchange="filterTable()">
      <option value="">전체</option>
      <option value="Y">Deprecated만</option>
      <option value="N">Active만</option>
    </select>
    <select id="callFilter" onchange="filterTable()">
      <option value="">전체 호출건수</option>
      <option value="zero">미호출 (0건)</option>
      <option value="has">호출 있음</option>
      <option value="none">APM 미조회</option>
    </select>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <!-- ─── 테이블 ─── -->
  <div class="table-wrap">
    <table id="apiTable">
      <thead>
        <tr>
          <th onclick="sortBy('httpMethod')">Method <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('apiPath')">API 경로 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('controllerName')">컨트롤러 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('methodName')">메소드명 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('programId')">프로그램ID <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('apiOperationValue')">설명 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('isDeprecated')">상태 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('callCount')" id="callCountHeader" class="apm-col">
            호출건수 <span class="sort-icon">↕</span>
          </th>
          <th>최근 커밋</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="9"><div class="state-box">소스 경로를 입력하고 <b>추출 시작</b>을 클릭하세요.</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let allApis = [];
  let sortKey = 'apiPath';
  let sortAsc = true;
  let whatapOpen = false;
  let whatapLoaded = false; // Whatap 통계가 한 번이라도 로드됐는지

  // ── Whatap 패널 토글 ─────────────────────────────────────
  function toggleWhatap() {
    whatapOpen = !whatapOpen;
    document.getElementById('whatapBody').classList.toggle('open', whatapOpen);
    document.getElementById('whatapArrow').classList.toggle('open', whatapOpen);
  }

  // ── API 추출 ─────────────────────────────────────────────
  async function doExtract() {
    const rootPath = document.getElementById('rootPath').value.trim();
    if (!rootPath) { showToast('소스 경로를 입력하세요.', 'error'); return; }

    setExtracting(true);
    showLoading('소스 파일 분석 중...');
    try {
      const res = await fetch('/api/extract', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          rootPath,
          domain:        document.getElementById('domain').value.trim(),
          apiPathPrefix: document.getElementById('apiPathPrefix').value.trim(),
          gitBinPath:    document.getElementById('gitBinPath').value.trim(),
          pathConstants: document.getElementById('pathConstants').value.trim()
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '서버 오류');

      allApis = data.apis || [];
      whatapLoaded = false; // 새 추출 시 Whatap 상태 초기화
      document.getElementById('statApmPill').style.display = 'none';
      document.getElementById('whatapBadge').style.display = 'none';
      renderStats();
      filterTable();
      showStats(true);
      showToast(`추출 완료 — ${allApis.length}개 API`, 'success');
    } catch(e) {
      showToast(e.message, 'error');
      showEmpty('추출 오류: ' + e.message);
    } finally {
      setExtracting(false);
    }
  }

  // ── Whatap 통계 가져오기 ─────────────────────────────────
  async function doFetchWhatap() {
    const url    = document.getElementById('wUrl').value.trim();
    const cookie = document.getElementById('wCookie').value.trim();
    const start  = document.getElementById('wStart').value.trim();
    const end    = document.getElementById('wEnd').value.trim();
    if (!url)    { showToast('Whatap URL을 입력하세요.', 'error'); return; }
    if (!cookie) { showToast('쿠키를 입력하세요.', 'error'); return; }
    if (!start || !end) { showToast('시작일/종료일을 입력하세요.', 'error'); return; }

    const btn = document.getElementById('whatapBtn');
    btn.disabled = true; btn.textContent = '조회 중...';
    const bar = document.getElementById('whatapProgress');
    bar.style.display = 'block';

    try {
      const res = await fetch('/api/whatap/stats', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          whatapUrl: url,
          pcode:     parseInt(document.getElementById('wPcode').value) || 8,
          cookie,
          startDate: start,
          endDate:   end,
          filters:   document.getElementById('wFilter').value.trim(),
          okinds:    document.getElementById('wOkinds').value.trim()
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '서버 오류');

      // allApis에 호출건수 병합
      const stats = data.stats || {};
      let matched = 0;
      allApis.forEach(a => {
        const cnt = stats[a.apiPath];
        if (cnt !== undefined) { a.callCount = cnt; matched++; }
        else                   { a.callCount = null; }
      });

      whatapLoaded = true;
      document.getElementById('whatapBadge').style.display = 'inline';
      document.getElementById('statApmPill').style.display = 'flex';
      document.getElementById('statApm').textContent = data.apiCount;

      filterTable();
      renderStats();
      showStats(true);
      showToast(`Whatap 완료 — ${data.apiCount}건 수집 · ${matched}개 API 매핑`, 'info');
    } catch(e) {
      showToast('Whatap 오류: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = '호출건수 가져오기';
      bar.style.display = 'none';
    }
  }

  // ── 통계 렌더 ────────────────────────────────────────────
  function renderStats() {
    document.getElementById('statTotal').textContent   = allApis.length;
    document.getElementById('statDep').textContent     = allApis.filter(a => a.isDeprecated === 'Y').length;
    document.getElementById('statActive').textContent  = allApis.filter(a => a.isDeprecated !== 'Y').length;
    document.getElementById('statGet').textContent     = allApis.filter(a => a.httpMethod === 'GET').length;
    document.getElementById('statPost').textContent    = allApis.filter(a => a.httpMethod === 'POST').length;
    document.getElementById('statPut').textContent     = allApis.filter(a => a.httpMethod === 'PUT').length;
    document.getElementById('statDelete').textContent  = allApis.filter(a => a.httpMethod === 'DELETE').length;
  }

  // ── 필터링 & 렌더 ────────────────────────────────────────
  function filterTable() {
    const q      = document.getElementById('searchInput').value.toLowerCase();
    const method = document.getElementById('methodFilter').value;
    const dep    = document.getElementById('depFilter').value;
    const call   = document.getElementById('callFilter').value;

    let filtered = allApis.filter(a => {
      const text = [a.apiPath, a.controllerName, a.methodName, a.apiOperationValue,
                    a.programId, a.descriptionTag].join(' ').toLowerCase();
      const callOk = !call
        || (call === 'zero' && a.callCount !== null && a.callCount !== undefined && a.callCount === 0)
        || (call === 'has'  && a.callCount !== null && a.callCount !== undefined && a.callCount > 0)
        || (call === 'none' && (a.callCount === null || a.callCount === undefined));
      return (!q || text.includes(q))
          && (!method || a.httpMethod === method)
          && (!dep    || a.isDeprecated === dep)
          && callOk;
    });

    filtered.sort((x, y) => {
      let a, b;
      if (sortKey === 'callCount') {
        a = x.callCount ?? -1;
        b = y.callCount ?? -1;
        return sortAsc ? a - b : b - a;
      }
      a = (x[sortKey] || '').toString().toLowerCase();
      b = (y[sortKey] || '').toString().toLowerCase();
      return sortAsc ? a.localeCompare(b) : b.localeCompare(a);
    });

    document.getElementById('filterCount').textContent = `${filtered.length} / ${allApis.length}건`;
    renderRows(filtered);
  }

  // ── 테이블 행 렌더 ───────────────────────────────────────
  function renderRows(list) {
    const tbody = document.getElementById('tbody');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="9"><div class="state-box">검색 결과가 없습니다.</div></td></tr>';
      return;
    }
    tbody.innerHTML = list.map(a => `
      <tr>
        <td><span class="badge badge-${a.httpMethod||'REQUEST'}">${a.httpMethod||'?'}</span></td>
        <td>
          <div class="api-path">${esc(a.apiPath)}</div>
          ${a.fullUrl ? `<div style="font-size:10px;color:#94a3b8;">${esc(a.fullUrl)}</div>` : ''}
        </td>
        <td class="ctrl-name">${esc(a.controllerName)}</td>
        <td style="font-size:12px;">${esc(a.methodName)}</td>
        <td style="font-family:monospace;font-size:11px;">${esc(a.programId)}</td>
        <td class="api-op">${esc(label(a))}</td>
        <td>${a.isDeprecated === 'Y'
          ? '<span class="badge badge-dep">Deprecated</span>'
          : '<span class="badge badge-ok">Active</span>'}</td>
        <td style="text-align:right;">${callCountCell(a)}</td>
        <td class="git-info">${gitCell(a.git1)}${gitCell(a.git2, true)}${gitCell(a.git3, true)}</td>
      </tr>`).join('');
  }

  function callCountCell(a) {
    if (!whatapLoaded)              return '<span class="call-none">-</span>';
    if (a.callCount === null || a.callCount === undefined)
                                    return '<span class="call-none">미매핑</span>';
    if (a.callCount === 0)          return '<span class="call-zero">0</span>';
    return `<span class="call-count">${a.callCount.toLocaleString()}</span>`;
  }

  function label(a) {
    if (a.apiOperationValue && a.apiOperationValue !== '-') return a.apiOperationValue;
    if (a.descriptionTag && a.descriptionTag !== '-') return a.descriptionTag;
    if (a.fullComment && a.fullComment !== '-') return a.fullComment.slice(0, 60) + (a.fullComment.length > 60 ? '…' : '');
    return '';
  }

  function gitCell(g, secondary = false) {
    if (!g || g[0] === '-') return secondary ? '' : '<span style="color:#cbd5e1;font-size:11px;">이력 없음</span>';
    const prefix = secondary ? '<hr style="border:none;border-top:1px solid var(--border);margin:3px 0;">' : '';
    return `${prefix}<span class="git-date">${esc(g[0])}</span> ${esc(g[1])}<br><span style="font-size:10px;">${esc(g[2])}</span>`;
  }

  // ── 정렬 ─────────────────────────────────────────────────
  function sortBy(key) {
    if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = true; }
    document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
    const keyMap = {httpMethod:0, apiPath:1, controllerName:2, methodName:3,
                    programId:4, apiOperationValue:5, isDeprecated:6, callCount:7};
    if (keyMap[key] !== undefined) {
      const th = document.querySelectorAll('thead th')[keyMap[key]];
      th.classList.add('sorted');
      th.querySelector('.sort-icon').textContent = sortAsc ? '↑' : '↓';
    }
    filterTable();
  }

  // ── UI 헬퍼 ──────────────────────────────────────────────
  function showStats(v) {
    document.getElementById('statsBar').style.display = v ? 'flex' : 'none';
    document.getElementById('filterBar').style.display = v ? 'flex' : 'none';
  }
  function setExtracting(v) {
    const btn = document.getElementById('extractBtn');
    btn.disabled = v; btn.textContent = v ? '추출 중...' : '추출 시작';
  }
  function showLoading(msg) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="9"><div class="state-box"><div class="spinner"></div><br>${msg}</div></td></tr>`;
  }
  function showEmpty(msg) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="9"><div class="state-box">${esc(msg)}</div></td></tr>`;
  }
  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
  }
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // 엔터키 추출
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.closest('.card')) {
      if (document.activeElement.classList.contains('purple')) doFetchWhatap();
      else doExtract();
    }
  });
</script>
</body>
</html>
