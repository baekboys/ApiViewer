<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Viewer — 저장 이력 조회</title>
  <style>
    :root {
      --bg: #f4f6f9; --card: #ffffff; --primary: #3b82f6; --primary-hover: #2563eb;
      --danger: #ef4444; --success: #22c55e; --purple: #8b5cf6;
      --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
      --row-hover: #f8fafc; --shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

    .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); }
    .header h1 { font-size: 18px; font-weight: 700; color: var(--primary); }
    .header-sub { font-size: 12px; color: var(--text-muted); background: #f1f5f9; padding: 3px 10px; border-radius: 4px; font-weight: 600; }
    .header-right { margin-left: auto; }

    .main { max-width: 1700px; margin: 0 auto; padding: 20px 24px; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .card-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .card-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }

    /* 조회 폼 */
    .query-layout { display: grid; grid-template-columns: 220px 1fr auto; gap: 16px; align-items: start; }
    label.field { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--text-muted); font-weight: 600; }
    label.field select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; outline: none; background: var(--card); transition: border .15s; }
    label.field select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px #3b82f620; }

    /* 달력 */
    .calendar-wrap { flex: 1; }
    .calendar-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .cal-nav { background: none; border: 1px solid var(--border); border-radius: 5px; width: 26px; height: 26px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); }
    .cal-nav:hover { background: #f1f5f9; }
    .cal-month-label { font-size: 13px; font-weight: 700; color: var(--text); min-width: 100px; text-align: center; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 32px); gap: 3px; }
    .cal-dow { text-align: center; font-size: 10px; font-weight: 700; color: var(--text-muted); padding: 3px 0; }
    .cal-day { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 12px; cursor: default; color: var(--text-muted); position: relative; }
    .cal-day.has-data { background: #dbeafe; color: var(--primary); font-weight: 700; cursor: pointer; }
    .cal-day.has-data:hover { background: #bfdbfe; }
    .cal-day.selected { background: var(--primary) !important; color: #fff !important; }
    .cal-day.other-month { opacity: .3; cursor: default; }

    .query-actions { display: flex; flex-direction: column; gap: 8px; padding-top: 18px; }
    .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; white-space: nowrap; height: 34px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-blue { background: var(--primary); color: #fff; }
    .btn-blue:not(:disabled):hover { background: var(--primary-hover); }
    .btn-ghost { background: #f1f5f9; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:not(:disabled):hover { background: #e2e8f0; }

    .db-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); margin-top: 12px; }
    .db-meta strong { color: var(--primary); }

    /* 통계 */
    .stats-bar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .stat-pill { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 12px; display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow); }
    .stat-pill strong { font-size: 15px; font-weight: 700; }
    .stat-pill.dep strong { color: var(--danger); }
    .stat-pill.ok strong { color: var(--success); }

    /* 필터 */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .filter-bar input[type=text] { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; outline: none; width: 260px; }
    .filter-bar input:focus { border-color: var(--primary); }
    .filter-bar select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; outline: none; background: var(--card); }
    .filter-count { margin-left: auto; font-size: 12px; color: var(--text-muted); }

    /* 테이블 */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: auto; box-shadow: var(--shadow); max-height: calc(100vh - 320px); }
    table { width: 100%; border-collapse: collapse; }
    thead th { position: sticky; top: 0; z-index: 2; background: #f1f5f9; padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
    thead th:hover { background: #e2e8f0; }
    thead th.sorted { color: var(--primary); }
    .sort-icon { margin-left: 3px; opacity: .4; }
    .sorted .sort-icon { opacity: 1; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }
    tbody td { padding: 8px 12px; vertical-align: top; max-width: 260px; word-break: break-all; }

    .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .badge-GET    { background:#dcfce7;color:#166534; } .badge-POST   { background:#dbeafe;color:#1e40af; }
    .badge-PUT    { background:#fef9c3;color:#854d0e; } .badge-DELETE { background:#fee2e2;color:#991b1b; }
    .badge-PATCH  { background:#ede9fe;color:#5b21b6; } .badge-REQUEST{ background:#f1f5f9;color:#475569; }
    .badge-dep { background:#fee2e2;color:#991b1b;font-size:10px; }
    .badge-ok  { background:#f1f5f9;color:#64748b;font-size:10px; }

    .api-path { font-family:'Consolas',monospace; font-size:12px; color:#1e40af; }
    .api-op   { color:var(--text-muted); font-size:12px; }
    .ctrl-name { font-size:11px; color:var(--text-muted); }
    .git-info { font-size:11px; color:var(--text-muted); line-height:1.7; min-width:180px; }
    .git-date { font-weight:600; color:var(--text); }

    .state-box { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .spinner { display:inline-block; width:26px; height:26px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .7s linear infinite; margin-bottom:10px; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .toast { position:fixed; bottom:24px; right:24px; padding:10px 18px; border-radius:8px; font-size:13px; font-weight:500; color:#fff; z-index:9999; opacity:0; transition:opacity .3s; pointer-events:none; }
    .toast.show { opacity:1; }
    .toast.error   { background:var(--danger); }
    .toast.success { background:var(--success); }
    .toast.info    { background:var(--purple); }
  </style>
</head>
<body>

<div class="header">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
  </svg>
  <h1>API Viewer</h1>
  <span class="header-sub">저장 이력 조회</span>
  <div class="header-right">
    <a href="/" style="font-size:12px;color:var(--text-muted);font-weight:600;text-decoration:none;padding:6px 14px;border:1px solid var(--border);border-radius:6px;">← 추출 페이지</a>
  </div>
</div>

<div class="main">

  <!-- 조회 조건 -->
  <div class="card">
    <div class="card-title"><span class="dot"></span>조회 조건</div>
    <div class="query-layout">

      <!-- 레포지토리 선택 -->
      <label class="field">레포지토리
        <select id="repoSelect" onchange="onRepoChange()">
          <option value="">-- 선택 --</option>
        </select>
      </label>

      <!-- 달력 -->
      <div class="calendar-wrap">
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px;">추출 날짜</div>
        <div class="calendar-header">
          <button class="cal-nav" onclick="moveMonth(-1)">‹</button>
          <span class="cal-month-label" id="calMonthLabel"></span>
          <button class="cal-nav" onclick="moveMonth(1)">›</button>
          <span id="selectedDateBadge" style="margin-left:8px;font-size:12px;color:var(--primary);font-weight:700;"></span>
        </div>
        <div class="calendar-grid" id="calGrid"></div>
      </div>

      <!-- 조회 버튼 -->
      <div class="query-actions">
        <button class="btn btn-blue" id="loadBtn" onclick="loadApis()">조회</button>
      </div>
    </div>

    <div class="db-meta" id="dbMeta" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
      레포지토리: <strong id="metaRepo">-</strong> &nbsp;|&nbsp; 추출일: <strong id="metaDate">-</strong> &nbsp;|&nbsp; 총 <strong id="metaTotal">0</strong>개 API
    </div>
  </div>

  <!-- 통계 -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-pill ok"><span>전체</span><strong id="statTotal">0</strong></div>
    <div class="stat-pill"><span>Active</span><strong id="statActive">0</strong></div>
    <div class="stat-pill dep"><span>Deprecated</span><strong id="statDep">0</strong></div>
    <div class="stat-pill"><span>GET</span><strong id="statGet">0</strong></div>
    <div class="stat-pill"><span>POST</span><strong id="statPost">0</strong></div>
    <div class="stat-pill"><span>PUT</span><strong id="statPut">0</strong></div>
    <div class="stat-pill"><span>DELETE</span><strong id="statDelete">0</strong></div>
  </div>

  <!-- 검색/필터 -->
  <div class="filter-bar" id="filterBar" style="display:none">
    <input type="text" id="searchInput" placeholder="경로, 컨트롤러, 메소드명 검색..." oninput="filterTable()">
    <select id="methodFilter" onchange="filterTable()">
      <option value="">전체 HTTP Method</option>
      <option>GET</option><option>POST</option><option>PUT</option>
      <option>DELETE</option><option>PATCH</option><option>REQUEST</option>
    </select>
    <select id="depFilter" onchange="filterTable()">
      <option value="">전체</option>
      <option value="Y">Deprecated만</option>
      <option value="N">Active만</option>
    </select>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <!-- 테이블 -->
  <div class="table-wrap">
    <table id="apiTable">
      <thead>
        <tr>
          <th onclick="sortBy('httpMethod')">Method <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('apiPath')">API 경로 <span class="sort-icon">↕</span></th>
          <th>URL 호출</th>
          <th onclick="sortBy('controllerName')">컨트롤러 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('methodName')">메소드명 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('programId')">프로그램ID <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('apiOperationValue')">설명 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('isDeprecated')">상태 <span class="sort-icon">↕</span></th>
          <th>최근 커밋 이력</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="9"><div class="state-box">레포지토리와 날짜를 선택하고 <b>조회</b>를 클릭하세요.</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let allApis = [];
  let sortKey = 'apiPath', sortAsc = true;
  let availableDates = new Set(); // "YYYY-MM-DD"
  let selectedDate = null;
  let calYear, calMonth;

  // ── 초기화 ────────────────────────────────────────────────
  async function initRepos() {
    const today = new Date();
    calYear = today.getFullYear();
    calMonth = today.getMonth(); // 0-indexed
    renderCalendar();

    try {
      const res = await fetch('/api/db/repositories');
      const repos = await res.json();
      const sel = document.getElementById('repoSelect');
      repos.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r; opt.textContent = r;
        sel.appendChild(opt);
      });
      if (repos.length === 0) showToast('저장된 데이터가 없습니다. 먼저 추출을 실행하세요.', 'error');
    } catch(e) { showToast('레포지토리 목록 조회 실패', 'error'); }
  }

  // ── 레포 변경 → 날짜 목록 로드 ──────────────────────────
  async function onRepoChange() {
    const repo = document.getElementById('repoSelect').value;
    availableDates = new Set();
    selectedDate = null;
    document.getElementById('selectedDateBadge').textContent = '';
    renderCalendar();

    if (!repo) return;
    try {
      const res = await fetch(`/api/db/dates?repository=${encodeURIComponent(repo)}`);
      const dates = await res.json();
      availableDates = new Set(dates);

      // 가장 최신 날짜가 있는 월로 이동
      if (dates.length > 0) {
        const latest = dates[0]; // DESC 정렬이므로 첫 번째가 최신
        const [y, m] = latest.split('-').map(Number);
        calYear = y; calMonth = m - 1;
        selectedDate = latest;
        document.getElementById('selectedDateBadge').textContent = latest + ' 선택됨';
      }
      renderCalendar();
    } catch(e) { showToast('날짜 목록 조회 실패', 'error'); }
  }

  // ── 달력 렌더 ─────────────────────────────────────────────
  function renderCalendar() {
    const DAYS = ['일','월','화','수','목','금','토'];
    const label = document.getElementById('calMonthLabel');
    label.textContent = `${calYear}년 ${calMonth + 1}월`;

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    // 요일 헤더
    DAYS.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=일
    const lastDate = new Date(calYear, calMonth + 1, 0).getDate();
    const prevLastDate = new Date(calYear, calMonth, 0).getDate();

    // 이전 달 빈 칸
    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day other-month';
      el.textContent = prevLastDate - firstDay + 1 + i;
      grid.appendChild(el);
    }

    // 이번 달 날짜
    for (let d = 1; d <= lastDate; d++) {
      const el = document.createElement('div');
      const mm = String(calMonth + 1).padStart(2, '0');
      const dd = String(d).padStart(2, '0');
      const dateStr = `${calYear}-${mm}-${dd}`;

      el.className = 'cal-day';
      el.textContent = d;

      if (availableDates.has(dateStr)) {
        el.classList.add('has-data');
        el.title = `${dateStr} 데이터 있음`;
        el.onclick = () => selectDate(dateStr, el);
      }
      if (dateStr === selectedDate) el.classList.add('selected');

      grid.appendChild(el);
    }

    // 다음 달 빈 칸 (6줄 고정)
    const total = firstDay + lastDate;
    const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let i = 1; i <= remaining; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day other-month';
      el.textContent = i;
      grid.appendChild(el);
    }
  }

  function selectDate(dateStr) {
    selectedDate = dateStr;
    document.getElementById('selectedDateBadge').textContent = dateStr + ' 선택됨';
    renderCalendar();
  }

  function moveMonth(delta) {
    calMonth += delta;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    renderCalendar();
  }

  // ── API 조회 ──────────────────────────────────────────────
  async function loadApis() {
    const repo = document.getElementById('repoSelect').value;
    if (!repo)         { showToast('레포지토리를 선택하세요.', 'error'); return; }
    if (!selectedDate) { showToast('날짜를 선택하세요.', 'error'); return; }

    document.getElementById('loadBtn').disabled = true;
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="9"><div class="state-box"><div class="spinner"></div><br>조회 중...</div></td></tr>';

    try {
      const res = await fetch(`/api/db/apis?repository=${encodeURIComponent(repo)}&date=${selectedDate}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '서버 오류');

      allApis = data.apis || [];
      renderStats();
      filterTable();
      document.getElementById('statsBar').style.display = 'flex';
      document.getElementById('filterBar').style.display = 'flex';
      document.getElementById('dbMeta').style.display = 'flex';
      document.getElementById('metaRepo').textContent = repo;
      document.getElementById('metaDate').textContent = selectedDate;
      document.getElementById('metaTotal').textContent = allApis.length;
      showToast(`${allApis.length}개 API 조회 완료`, 'success');
    } catch(e) {
      showToast(e.message, 'error');
      document.getElementById('tbody').innerHTML =
        `<tr><td colspan="9"><div class="state-box">조회 오류: ${esc(e.message)}</div></td></tr>`;
    } finally {
      document.getElementById('loadBtn').disabled = false;
    }
  }

  // ── 통계 ──────────────────────────────────────────────────
  function renderStats() {
    document.getElementById('statTotal').textContent  = allApis.length;
    document.getElementById('statDep').textContent    = allApis.filter(a => a.isDeprecated === 'Y').length;
    document.getElementById('statActive').textContent = allApis.filter(a => a.isDeprecated !== 'Y').length;
    document.getElementById('statGet').textContent    = allApis.filter(a => a.httpMethod === 'GET').length;
    document.getElementById('statPost').textContent   = allApis.filter(a => a.httpMethod === 'POST').length;
    document.getElementById('statPut').textContent    = allApis.filter(a => a.httpMethod === 'PUT').length;
    document.getElementById('statDelete').textContent = allApis.filter(a => a.httpMethod === 'DELETE').length;
  }

  // ── 필터 ──────────────────────────────────────────────────
  function filterTable() {
    const q      = document.getElementById('searchInput').value.toLowerCase();
    const method = document.getElementById('methodFilter').value;
    const dep    = document.getElementById('depFilter').value;

    let filtered = allApis.filter(a => {
      const text = [a.apiPath, a.controllerName, a.methodName, a.apiOperationValue,
                    a.programId, a.descriptionTag].join(' ').toLowerCase();
      return (!q || text.includes(q))
          && (!method || a.httpMethod === method)
          && (!dep    || a.isDeprecated === dep);
    });

    filtered.sort((x, y) => {
      const a = (x[sortKey] || '').toString().toLowerCase();
      const b = (y[sortKey] || '').toString().toLowerCase();
      return sortAsc ? a.localeCompare(b) : b.localeCompare(a);
    });

    document.getElementById('filterCount').textContent = `${filtered.length} / ${allApis.length}건`;
    renderRows(filtered);
  }

  // ── 테이블 렌더 ───────────────────────────────────────────
  function renderRows(list) {
    const tbody = document.getElementById('tbody');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="9"><div class="state-box">검색 결과가 없습니다.</div></td></tr>';
      return;
    }
    tbody.innerHTML = list.map(a => `
      <tr>
        <td><span class="badge badge-${a.httpMethod||'REQUEST'}">${a.httpMethod||'?'}</span></td>
        <td><div class="api-path">${esc(a.apiPath)}</div></td>
        <td>${a.fullUrl
          ? `<a href="${esc(a.fullUrl)}" target="_blank" style="font-size:11px;color:var(--primary);text-decoration:none;padding:2px 8px;border:1px solid var(--primary);border-radius:4px;white-space:nowrap;">열기 ↗</a>`
          : '<span style="color:#cbd5e1;font-size:11px;">-</span>'}</td>
        <td class="ctrl-name">${esc(a.controllerName)}</td>
        <td style="font-size:12px;">${esc(a.methodName)}</td>
        <td style="font-family:monospace;font-size:11px;">${esc(a.programId)}</td>
        <td class="api-op">${esc(label(a))}</td>
        <td>${a.isDeprecated === 'Y'
          ? '<span class="badge badge-dep">Deprecated</span>'
          : '<span class="badge badge-ok">Active</span>'}</td>
        <td class="git-info">${gitHistoryCell(a.gitHistory)}</td>
      </tr>`).join('');
  }

  function gitHistoryCell(json) {
    if (!json) return '<span style="color:#cbd5e1;font-size:11px;">이력 없음</span>';
    let list;
    try { list = JSON.parse(json); } catch(e) { return '-'; }
    if (!list.length) return '<span style="color:#cbd5e1;font-size:11px;">이력 없음</span>';
    return list.map((g, i) => {
      const sep = i > 0 ? '<hr style="border:none;border-top:1px solid var(--border);margin:3px 0;">' : '';
      return `${sep}<span class="git-date">${esc(g.date)}</span> ${esc(g.author)}<br>
              <span style="font-size:10px;">${esc(g.message)}</span>`;
    }).join('');
  }

  // ── 정렬 ──────────────────────────────────────────────────
  function sortBy(key) {
    if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = true; }
    document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
    const keyMap = { httpMethod:0, apiPath:1, controllerName:3, methodName:4,
                     programId:5, apiOperationValue:6, isDeprecated:7 };
    if (keyMap[key] !== undefined) {
      const th = document.querySelectorAll('thead th')[keyMap[key]];
      th.classList.add('sorted');
      th.querySelector('.sort-icon').textContent = sortAsc ? '↑' : '↓';
    }
    filterTable();
  }

  // ── 헬퍼 ──────────────────────────────────────────────────
  function label(a) {
    if (a.apiOperationValue && a.apiOperationValue !== '-') return a.apiOperationValue;
    if (a.descriptionTag && a.descriptionTag !== '-') return a.descriptionTag;
    if (a.fullComment && a.fullComment !== '-') return a.fullComment.slice(0, 60) + (a.fullComment.length > 60 ? '…' : '');
    return '';
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') loadApis(); });

  initRepos();
</script>
</body>
</html>
